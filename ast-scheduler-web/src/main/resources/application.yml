server:
  port: 8080

spring:
  application:
    name: ast-scheduler
  profiles:
    active: sqlite
  datasource:
    url: jdbc:sqlite:./data/scheduler.db
    driver-class-name: org.sqlite.JDBC
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      separator: $$

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.ast.scheduler.core.entity
  configuration:
    map-underscore-to-camel-case: true

scheduler:
  pool-size: 10
  log-retention-days: 30

logging:
  level:
    com.ast.scheduler: INFO

