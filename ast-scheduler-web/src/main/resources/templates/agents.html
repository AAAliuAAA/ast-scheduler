<!DOCTYPE html>
<html lang="zh" data-theme="light" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Scheduler - My AI Agents</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.6.0/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <!-- Navbar -->
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="drawer lg:drawer-open">
        <input id="drawer" type="checkbox" class="drawer-toggle" />
        <div class="drawer-content bg-base-200">
            <!-- Main Content -->
            <div class="p-4 lg:p-8 max-w-7xl mx-auto">
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-3xl font-bold">My AI Agents</h1>
                    <button class="btn btn-primary">添加 AI Agent</button>
                </div>

                <!-- AI Agents Table -->
                <div class="card bg-base-100 shadow">
                    <div class="card-body">
                        <div class="overflow-x-auto">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>名称</th>
                                        <th>类型</th>
                                        <th>连接方式</th>
                                        <th>状态</th>
                                        <th>分组</th>
                                        <th>最后检测</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td>
                                            <div class="font-bold">Claude Code</div>
                                            <div class="text-sm opacity-50">AI编程助手</div>
                                        </td>
                                        <td>CLAUDE_CODE</td>
                                        <td>CLI</td>
                                        <td><span class="badge badge-success">在线</span></td>
                                        <td>default</td>
                                        <td>2分钟前</td>
                                        <td>
                                            <button class="btn btn-xs">编辑</button>
                                            <button class="btn btn-xs">检测</button>
                                            <button class="btn btn-xs btn-error">删除</button>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <div class="font-bold">OpenClaw</div>
                                            <div class="text-sm opacity-50">远程AI Agent</div>
                                        </td>
                                        <td>OPENCLAW</td>
                                        <td>API</td>
                                        <td><span class="badge badge-success">在线</span></td>
                                        <td>default</td>
                                        <td>5分钟前</td>
                                        <td>
                                            <button class="btn btn-xs">编辑</button>
                                            <button class="btn btn-xs">检测</button>
                                            <button class="btn btn-xs btn-error">删除</button>
                                        </td>
                                    </tr>
                                    <tr>
                                        <td>
                                            <div class="font-bold">Python 脚本</div>
                                            <div class="text-sm opacity-50">自定义脚本</div>
                                        </td>
                                        <td>SCRIPT</td>
                                        <td>CLI</td>
                                        <td><span class="badge badge-error">离线</span></td>
                                        <td>scripts</td>
                                        <td>1小时前</td>
                                        <td>
                                            <button class="btn btn-xs">编辑</button>
                                            <button class="btn btn-xs">检测</button>
                                            <button class="btn btn-xs btn-error">删除</button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sidebar -->
        <div th:replace="~{fragments :: sidebar('agents')}"></div>
    </div>

    <script th:replace="~{fragments :: theme-script}"></script>
</body>
</html>
