<!DOCTYPE html>
<html lang="zh" data-theme="light" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Scheduler - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.6.0/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <!-- Navbar -->
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="drawer lg:drawer-open">
        <input id="drawer" type="checkbox" class="drawer-toggle" />
        <div class="drawer-content bg-base-200">
            <!-- Main Content -->
            <div class="p-4 lg:p-8 max-w-7xl mx-auto">
                <div class="flex justify-between items-center mb-6">
                    <h1 class="text-3xl font-bold">监控大盘</h1>
                    <button class="btn btn-primary">新建任务</button>
                </div>

                <!-- Streaming Output Section -->
                <div class="mb-8">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-2xl font-bold">实时输出</h2>
                    </div>

                    <div class="card bg-base-100 shadow">
                        <div class="card-body">
                            <h3 class="card-title">Claude Code</h3>
                            <p class="text-sm mb-2">状态: 在线 | 最后执行: 2分钟前 | 成功率: 98%</p>
                            <div class="divider my-2"></div>
                            <div class="bg-base-200 p-4 rounded min-h-[200px] font-mono text-sm">
                                <p>流式传输内容将在这里显示...</p>
                            </div>
                            <div class="card-actions justify-end mt-4">
                                <button class="btn btn-sm btn-primary">查看详情</button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Recent Tasks -->
                <div class="card bg-base-100 shadow">
                    <div class="card-body">
                        <h2 class="card-title text-2xl mb-4">最近执行任务</h2>
                        <div class="overflow-x-auto">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>状态</th>
                                        <th>任务名称</th>
                                        <th>Agent</th>
                                        <th>开始时间</th>
                                        <th>耗时</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr>
                                        <td><span class="badge badge-success">成功</span></td>
                                        <td>每日报告</td>
                                        <td>Claude</td>
                                        <td>10:00</td>
                                        <td>2.3s</td>
                                        <td><button class="btn btn-xs">查看日志</button></td>
                                    </tr>
                                    <tr>
                                        <td><span class="badge badge-info">执行中</span></td>
                                        <td>数据分析</td>
                                        <td>OpenClaw</td>
                                        <td>10:05</td>
                                        <td>-</td>
                                        <td><button class="btn btn-xs">查看日志</button></td>
                                    </tr>
                                    <tr>
                                        <td><span class="badge badge-error">失败</span></td>
                                        <td>代码检查</td>
                                        <td>Python</td>
                                        <td>09:50</td>
                                        <td>0.5s</td>
                                        <td><button class="btn btn-xs">查看日志</button></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Sidebar -->
        <div th:replace="~{fragments :: sidebar('dashboard')}"></div>
    </div>

    <script th:replace="~{fragments :: theme-script}"></script>
</body>
</html>
